<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producto | MediVita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="antialiased text-slate-900 bg-slate-50">

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-extrabold tracking-wide text-emerald-600">
        MediVita
      </a>

      <nav class="flex gap-6 font-semibold">
        <a href="index.html" class="hover:text-emerald-600">Inicio</a>
        <a href="catalogo.html" class="hover:text-emerald-600">Catálogo</a>
        <a href="carrito.html" class="hover:text-emerald-600">Carrito</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">

    <a href="catalogo.html"
       class="inline-block bg-emerald-600 text-white px-6 py-3 rounded-full font-bold hover:bg-emerald-700">
      ← Volver al catálogo
    </a>

    <section id="product-root" class="mt-8 bg-white rounded-3xl shadow p-8">
      <div id="loading" class="text-center py-12">Cargando producto...</div>
    </section>

  </main>

<script>
    const URL_BFF_PRODUCTOS = 'http://localhost:8000/api/productos';

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString('es-CL', { minimumFractionDigits: 0 });
    }

    function renderProduct(product) {
      const root = document.getElementById('product-root');

      if (!product) {
        root.innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 font-bold">No se encontró el producto.</p>
            <a href="catalogo.html" class="inline-block mt-6 bg-emerald-600 text-white px-6 py-3 rounded-full font-bold">
              Volver al catálogo
            </a>
          </div>
        `;
        return;
      }

      // Mapeo adaptativo: prioriza Supabase, si no, usa el formato viejo del caché
      const nombre = product.nombre || product.title || 'Producto sin nombre';
      const marca = product.marca || product.body_html || 'Mixgreen';
      const categoria = product.categoria || product.product_type || 'General';
      const tiendaOrigen = product.tienda_origen || 'Mixgreen';
      const linkTienda = product.link_tienda || '#';
      
      const precioNormal = product.precio_normal || (product.variants?.[0] ? Number(product.variants[0].compare_at_price) : 0);
      const precioOferta = product.precio_oferta || (product.variants?.[0] ? Number(product.variants[0].price) : 0);
      const descuento = product.porcentaje_descuento || 0;

      const image = product.imagen_url || product.images?.[0]?.src || product.featured_image?.src || 'https://via.placeholder.com/640x480.png?text=Sin+imagen';

      root.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
          <div>
            <div class="bg-white rounded-2xl overflow-hidden shadow border border-slate-100 p-4">
              <img src="${image}" alt="${nombre}" class="w-full h-80 object-contain">
            </div>
          </div>

          <div class="md:col-span-2 flex flex-col justify-between">
            <div>
              <div class="flex gap-2 mb-3">
                <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">
                  Categoría: ${categoria}
                </span>
                <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full">
                  Origen: ${tiendaOrigen}
                </span>
              </div>

              <h1 class="text-4xl font-extrabold text-slate-900">
                ${nombre}
              </h1>
              
              <p class="mt-2 text-sm text-slate-500 font-medium">
                Marca: <span class="text-slate-800 font-bold">${marca}</span>
              </p>

              <div class="mt-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-4">
                  <span class="text-3xl font-extrabold text-indigo-600">$${formatPrice(precioOferta)}</span>
                  <span class="text-base line-through text-slate-400">$${formatPrice(precioNormal)}</span>
                  <span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded-md">-${descuento}% DCTO</span>
                </div>
                <p class="text-xs text-slate-400 mt-2">Precio Oferta.</p>
              </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100">
              <div class="flex flex-wrap gap-4 items-center">
                <button id="add-to-cart"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-sm transition">
                  Comparar precio
                </button>

                <a href="${linkTienda}" target="_blank" rel="noopener noreferrer"
                   class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold shadow-sm transition">
                  Ir a la tienda original (${tiendaOrigen}) ↗
                </a>
              </div>

              <p id="cart-message" class="mt-5 text-emerald-700 font-bold"></p>
            </div>
          </div>
        </div>
      `;

      document.getElementById('add-to-cart').addEventListener('click', () => {
        addToCart({
          handle: product.id ? product.id.toString() : product.handle,
          title: nombre,
          price: precioOferta,
          image: image
        });
      });
    }

    // Buscador alternativo usando tu BFF si no se encuentra en LocalStorage
    async function fetchProductFromBFF(id) {
      try {
        const res = await fetch(URL_BFF_PRODUCTOS);
        if (!res.ok) throw new Error('BFF error');
        const productos = await res.json();
        // Buscamos por ID numérico
        return productos.find(p => p.id.toString() === id.toString()) || null;
      } catch (err) {
        console.warn('Error obteniendo detalle desde BFF', err);
        return null;
      }
    }

    function addToCart(itemSummary) {
      const cart = JSON.parse(localStorage.getItem('medivitaCart')) || [];
      const existing = cart.find(item => item.handle === itemSummary.handle);

      if (existing) {
        existing.cantidad += 1;
      } else {
        cart.push({
          handle: itemSummary.handle,
          title: itemSummary.title,
          price: itemSummary.price,
          image: itemSummary.image,
          cantidad: 1
        });
      }

      localStorage.setItem('medivitaCart', JSON.stringify(cart));

      const message = document.getElementById('cart-message');
      message.textContent = '✅ Producto agregado al comparador';
    }

    (async function init() {
      const stored = localStorage.getItem('selectedProduct');
      let product = null;

      if (stored) {
        try {
          product = JSON.parse(stored);
        } catch {
          product = null;
        }
      }

      const handle = getQueryParam('handle');

      // Si por alguna razón el LocalStorage se borró, lo busca directo en tu BFF usando el ID
      if (!product && handle) {
        product = await fetchProductFromBFF(handle);
      }

      renderProduct(product);
    })();
  </script>

</body>
</html>
