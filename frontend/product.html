<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producto | MediVita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="antialiased text-slate-900 bg-slate-50">

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-extrabold tracking-wide text-emerald-600">
        MediVita
      </a>

      <nav class="flex gap-6 font-semibold">
        <a href="index.html" class="hover:text-emerald-600">Inicio</a>
        <a href="catalogo.html" class="hover:text-emerald-600">Catálogo</a>
        <a href="carrito.html" class="hover:text-emerald-600">Carrito</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">

    <a href="catalogo.html"
       class="inline-block bg-emerald-600 text-white px-6 py-3 rounded-full font-bold hover:bg-emerald-700">
      ← Volver al catálogo
    </a>

    <section id="product-root" class="mt-8 bg-white rounded-3xl shadow p-8">
      <div id="loading" class="text-center py-12">Cargando producto...</div>
    </section>

  </main>

  <script>
    const API_BASE = 'https://www.mixgreen.cl';

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString('es-CL', { minimumFractionDigits: 0 });
    }

    function renderProduct(product) {
      const root = document.getElementById('product-root');

      if (!product) {
        root.innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 font-bold">No se encontró el producto.</p>
            <a href="catalogo.html" class="inline-block mt-6 bg-emerald-600 text-white px-6 py-3 rounded-full font-bold">
              Volver al catálogo
            </a>
          </div>
        `;
        return;
      }

      const image =
        product.images?.[0]?.src ||
        product.featured_image?.src ||
        'https://via.placeholder.com/640x480.png?text=Sin+imagen';

      const price = product.variants?.[0] ? Number(product.variants[0].price) : 0;
      const description = product.body_html || 'Producto disponible en el catálogo MediVita.';

      root.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
          <div>
            <div class="bg-white rounded-2xl overflow-hidden shadow border border-slate-100">
              <img src="${image}" alt="${product.title}" class="w-full h-80 object-contain">
            </div>
          </div>

          <div class="md:col-span-2">
            <p class="text-sm uppercase tracking-[0.35em] text-emerald-600 font-bold">
              Detalle del producto
            </p>

            <h1 class="mt-3 text-4xl font-extrabold">
              ${product.title}
            </h1>

            <p class="mt-4 text-2xl text-indigo-600 font-bold">
              $${formatPrice(price)}
            </p>

            <div class="mt-6 text-slate-700 leading-relaxed text-lg">
              ${description}
            </div>

            <div class="mt-8 flex flex-wrap gap-4">
              <button id="add-to-cart"
                      class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold">
                Comparar precio
              </button>

              <a href="carrito.html"
                 class="border border-emerald-600 text-emerald-600 px-6 py-3 rounded-xl font-bold hover:bg-emerald-50">
                Ver comparador
              </a>
            </div>

            <p id="cart-message" class="mt-5 text-emerald-700 font-bold"></p>
          </div>
        </div>
      `;

      document.getElementById('add-to-cart').addEventListener('click', () => {
        addToCart(product);
      });
    }

    async function fetchProductByHandle(handle) {
      try {
        const res = await fetch(`${API_BASE}/products/${encodeURIComponent(handle)}.json`);
        if (!res.ok) throw new Error('fetch failed ' + res.status);
        const data = await res.json();
        return data?.product || null;
      } catch (err) {
        console.warn('Fetch by handle failed', err);
        return null;
      }
    }

    function addToCart(product) {
      const cart = JSON.parse(localStorage.getItem('medivitaCart')) || [];

      const price = product.variants?.[0] ? Number(product.variants[0].price) : 0;
      const image = product.images?.[0]?.src || product.featured_image?.src || '';

      const existing = cart.find(item => item.handle === product.handle);

      if (existing) {
        existing.cantidad += 1;
      } else {
        cart.push({
          handle: product.handle,
          title: product.title,
          price: price,
          image: image,
          cantidad: 1
        });
      }

      localStorage.setItem('medivitaCart', JSON.stringify(cart));

      const message = document.getElementById('cart-message');
      message.textContent = '✅ Producto agregado al comparador';
    }

    (async function init() {
      const stored = localStorage.getItem('selectedProduct');
      let product = null;

      if (stored) {
        try {
          product = JSON.parse(stored);
        } catch {
          product = null;
        }
      }

      const handle = getQueryParam('handle');

      if (!product && handle) {
        product = await fetchProductByHandle(handle);
      }

      renderProduct(product);
    })();
  </script>

</body>
</html>
