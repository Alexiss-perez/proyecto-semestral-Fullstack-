<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVita | Suplementos y Medicamentos</title>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { pastelPink: '#FCE7F3', pastelLavender: '#EDE9FE', pastelMint: '#DFFCF0', pastelYellow: '#FFF7CD' } } }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="antialiased text-gray-800">
  <!-- Hero -->
  <header class="bg-gradient-to-br from-pastelPink via-pastelLavender to-pastelMint py-16">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-gray-900">Descubre productos encantadores</h1>
      <p class="mt-4 text-gray-700 max-w-2xl mx-auto">Diseños únicos, colores suaves y envío rápido. Bienvenido a MediVita.</p>
      <div class="mt-8 flex items-center justify-center gap-4">
        <a href="#productos" class="inline-block bg-white text-indigo-600 px-6 py-3 rounded-lg shadow hover:shadow-lg transition">Explorar</a>
        <a href="#contacto" class="inline-block bg-transparent border border-white/40 text-white px-5 py-3 rounded-lg">Contacto</a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <!-- Categories simplified -->
    <section class="mb-10">
      <h2 class="text-xl font-semibold mb-4">Explora nuestras categorías</h2>
      <div class="flex gap-4 overflow-auto pb-2">
        <button data-category="vitaminas" class="category-filter flex-none bg-white rounded-2xl shadow px-5 py-4 w-44 text-center hover:scale-105 transform transition">
          <div class="text-3xl">💊</div>
          <p class="mt-2 font-medium">Vitaminas</p>
        </button>
        <button data-category="suplementos" class="category-filter flex-none bg-white rounded-2xl shadow px-5 py-4 w-44 text-center hover:scale-105 transform transition">
          <div class="text-3xl">🌿</div>
          <p class="mt-2 font-medium">Suplementos</p>
        </button>
        <button data-category="probioticos" class="category-filter flex-none bg-white rounded-2xl shadow px-5 py-4 w-44 text-center hover:scale-105 transform transition">
          <div class="text-3xl">🧪</div>
          <p class="mt-2 font-medium">Probióticos</p>
        </button>
      </div>
    </section>

    <!-- Products grid -->
    <section id="productos">
      <div class="flex flex-col gap-4 mb-6 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-2xl font-semibold">Nuestros Productos</h2>
        <p id="product-message" class="text-sm text-gray-600">Mostrando productos de la categoría <strong id="current-category">Vitaminas</strong>.</p>
      </div>
      <div id="contenedor-productos" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  <footer class="bg-gray-50 py-8 mt-12">
    <div class="max-w-6xl mx-auto px-6 text-center text-sm text-gray-600">
      <p>&copy; 2026 MediVita. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
